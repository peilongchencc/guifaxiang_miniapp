<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240" fill="none">

  <!-- decorative rings -->
  <circle cx="120" cy="120" r="102" stroke="#C9A96E" stroke-width="0.6" opacity="0.12"/>
  <circle cx="120" cy="120" r="96"  stroke="#C9A96E" stroke-width="0.3" opacity="0.08"/>

  <!-- box shadow -->
  <ellipse cx="120" cy="174" rx="54" ry="9" fill="#2C1A0F" opacity="0.12"/>

  <!-- left face -->
  <polygon points="70,116 120,141 120,166 70,141" fill="#2C1A0F"/>
  <!-- right face -->
  <polygon points="170,116 120,141 120,166 170,141" fill="#1A0E08"/>
  <!-- top face -->
  <polygon points="120,91 170,116 120,141 70,116" fill="#3D2416"/>

  <!-- wood grain lines -->
  <line x1="100" y1="97"  x2="150" y2="122" stroke="white" stroke-width="0.8" opacity="0.04"/>
  <line x1="112" y1="93"  x2="162" y2="118" stroke="white" stroke-width="0.8" opacity="0.04"/>
  <line x1="88"  y1="101" x2="138" y2="126" stroke="white" stroke-width="0.8" opacity="0.04"/>

  <!-- gold border lines -->
  <polygon points="120,91 170,116 120,141 70,116" stroke="#C9A96E" stroke-width="0.9" fill="none"/>
  <polygon points="70,116 120,141 120,166 70,141" stroke="#C9A96E" stroke-width="0.9" fill="none"/>
  <polygon points="170,116 120,141 120,166 170,141" stroke="#C9A96E" stroke-width="0.9" fill="none"/>

  <!-- inner gold trim on top face -->
  <polygon points="120,96 165,118 120,136 75,118" stroke="#C9A96E" stroke-width="0.45" opacity="0.5" fill="none"/>

  <!-- lotus motif on top face (isometric: scaleY=0.5) -->
  <g transform="translate(120,116) scale(1,0.5)">
    <!-- outer 6 petals -->
    <ellipse cx="0" cy="-16" rx="5"   ry="12" fill="#C9A96E" opacity="0.45" transform="rotate(0)"/>
    <ellipse cx="0" cy="-16" rx="5"   ry="12" fill="#C9A96E" opacity="0.45" transform="rotate(60)"/>
    <ellipse cx="0" cy="-16" rx="5"   ry="12" fill="#C9A96E" opacity="0.45" transform="rotate(120)"/>
    <ellipse cx="0" cy="-16" rx="5"   ry="12" fill="#C9A96E" opacity="0.45" transform="rotate(180)"/>
    <ellipse cx="0" cy="-16" rx="5"   ry="12" fill="#C9A96E" opacity="0.45" transform="rotate(240)"/>
    <ellipse cx="0" cy="-16" rx="5"   ry="12" fill="#C9A96E" opacity="0.45" transform="rotate(300)"/>
    <!-- inner 6 petals -->
    <ellipse cx="0" cy="-11" rx="4"   ry="9"  fill="#C9A96E" opacity="0.75" transform="rotate(30)"/>
    <ellipse cx="0" cy="-11" rx="4"   ry="9"  fill="#C9A96E" opacity="0.75" transform="rotate(90)"/>
    <ellipse cx="0" cy="-11" rx="4"   ry="9"  fill="#C9A96E" opacity="0.75" transform="rotate(150)"/>
    <ellipse cx="0" cy="-11" rx="4"   ry="9"  fill="#C9A96E" opacity="0.75" transform="rotate(210)"/>
    <ellipse cx="0" cy="-11" rx="4"   ry="9"  fill="#C9A96E" opacity="0.75" transform="rotate(270)"/>
    <ellipse cx="0" cy="-11" rx="4"   ry="9"  fill="#C9A96E" opacity="0.75" transform="rotate(330)"/>
    <!-- stamen -->
    <circle cx="0" cy="0" r="5.5" fill="#C9A96E"/>
    <circle cx="0" cy="0" r="3"   fill="#E8C88A"/>
    <circle cx="0" cy="0" r="1.2" fill="#C9A96E"/>
  </g>

  <!-- scattered petals -->
  <path d="M52,158 C49,152 54,145 58,149 C62,153 57,160 52,158 Z"
    stroke="#8B6344" stroke-width="0.8" fill="#8B6344" fill-opacity="0.12" transform="rotate(-25,55,153)"/>
  <path d="M63,172 C60,167 65,161 68,165 C71,169 66,174 63,172 Z"
    stroke="#8B6344" stroke-width="0.7" fill="#8B6344" fill-opacity="0.1" transform="rotate(-10,65,167)"/>
  <path d="M178,151 C181,145 187,147 186,152 C185,157 179,156 178,151 Z"
    stroke="#C9A96E" stroke-width="0.8" fill="#C9A96E" fill-opacity="0.15" transform="rotate(18,182,150)"/>
  <path d="M185,165 C188,160 193,162 192,167 C191,172 185,170 185,165 Z"
    stroke="#8B6344" stroke-width="0.7" fill="#8B6344" fill-opacity="0.1" transform="rotate(30,189,165)"/>
  <path d="M43,138 C41,134 45,130 48,133 C51,136 47,140 43,138 Z"
    stroke="#C9A96E" stroke-width="0.6" fill="#C9A96E" fill-opacity="0.12" transform="rotate(-40,46,135)"/>

  <!-- chrysanthemum outline (bottom-right) -->
  <g transform="translate(174,172)" opacity="0.22">
    <circle cx="0" cy="0" r="9" stroke="#8B6344" stroke-width="0.6" fill="none"/>
    <line x1="0"    y1="-9"   x2="0"    y2="9"    stroke="#8B6344" stroke-width="0.5"/>
    <line x1="-9"   y1="0"    x2="9"    y2="0"    stroke="#8B6344" stroke-width="0.5"/>
    <line x1="-6.4" y1="-6.4" x2="6.4"  y2="6.4"  stroke="#8B6344" stroke-width="0.5"/>
    <line x1="6.4"  y1="-6.4" x2="-6.4" y2="6.4"  stroke="#8B6344" stroke-width="0.5"/>
    <circle cx="0" cy="0" r="2.5" fill="#8B6344" opacity="0.4"/>
  </g>

  <!-- cloud motif (top-left) -->
  <g transform="translate(52,92)" opacity="0.14" stroke="#C9A96E" stroke-width="0.7" fill="none">
    <path d="M0,8 Q4,2 8,6 Q10,0 16,4 Q20,0 24,4 Q28,2 30,7"/>
    <path d="M2,10 Q6,4 10,8 Q12,2 18,6 Q22,2 26,6 Q30,4 32,9"/>
  </g>

</svg>
