<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240" fill="none">

  <!-- Decorative background rings -->
  <circle cx="120" cy="130" r="90" stroke="#c8a052" stroke-width="0.7" stroke-dasharray="4 8" opacity="0.2"/>
  <circle cx="120" cy="130" r="75" stroke="#c8a052" stroke-width="0.4" opacity="0.1"/>
  <circle cx="120" cy="130" r="75" fill="#c8a052" fill-opacity="0.025"/>

  <!-- Soft bag shadow -->
  <ellipse cx="120" cy="208" rx="40" ry="5.5" fill="#1a1f2e" opacity="0.07"/>

  <!-- Shopping bag body -->
  <rect x="74" y="106" width="92" height="96" rx="8" fill="#1a1f2e" fill-opacity="0.04"/>
  <rect x="74" y="106" width="92" height="96" rx="8" stroke="#c8a052" stroke-width="1.8" fill="none"/>

  <!-- Bag opening accent stripe -->
  <line x1="74" y1="120" x2="166" y2="120" stroke="#c8a052" stroke-width="0.7" opacity="0.3"/>

  <!-- Left handle (arch) -->
  <path d="M88,106 Q88,70 98,70 Q108,70 108,106"
        stroke="#c8a052" stroke-width="2.2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Right handle (arch) -->
  <path d="M132,106 Q132,70 142,70 Q152,70 152,106"
        stroke="#c8a052" stroke-width="2.2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Chrysanthemum motif (白菊) centered on bag face (120, 162) -->
  <g transform="translate(120, 162)">

    <!-- 12 outer petals -->
    <ellipse cx="0" cy="-19" rx="3" ry="10" fill="#c8a052" opacity="0.38"/>
    <ellipse cx="0" cy="-19" rx="3" ry="10" fill="#c8a052" opacity="0.38" transform="rotate(30)"/>
    <ellipse cx="0" cy="-19" rx="3" ry="10" fill="#c8a052" opacity="0.38" transform="rotate(60)"/>
    <ellipse cx="0" cy="-19" rx="3" ry="10" fill="#c8a052" opacity="0.38" transform="rotate(90)"/>
    <ellipse cx="0" cy="-19" rx="3" ry="10" fill="#c8a052" opacity="0.38" transform="rotate(120)"/>
    <ellipse cx="0" cy="-19" rx="3" ry="10" fill="#c8a052" opacity="0.38" transform="rotate(150)"/>
    <ellipse cx="0" cy="-19" rx="3" ry="10" fill="#c8a052" opacity="0.38" transform="rotate(180)"/>
    <ellipse cx="0" cy="-19" rx="3" ry="10" fill="#c8a052" opacity="0.38" transform="rotate(210)"/>
    <ellipse cx="0" cy="-19" rx="3" ry="10" fill="#c8a052" opacity="0.38" transform="rotate(240)"/>
    <ellipse cx="0" cy="-19" rx="3" ry="10" fill="#c8a052" opacity="0.38" transform="rotate(270)"/>
    <ellipse cx="0" cy="-19" rx="3" ry="10" fill="#c8a052" opacity="0.38" transform="rotate(300)"/>
    <ellipse cx="0" cy="-19" rx="3" ry="10" fill="#c8a052" opacity="0.38" transform="rotate(330)"/>

    <!-- 12 inner petals (offset 15°, more opaque) -->
    <ellipse cx="0" cy="-12" rx="2.4" ry="7" fill="#c8a052" opacity="0.68" transform="rotate(15)"/>
    <ellipse cx="0" cy="-12" rx="2.4" ry="7" fill="#c8a052" opacity="0.68" transform="rotate(45)"/>
    <ellipse cx="0" cy="-12" rx="2.4" ry="7" fill="#c8a052" opacity="0.68" transform="rotate(75)"/>
    <ellipse cx="0" cy="-12" rx="2.4" ry="7" fill="#c8a052" opacity="0.68" transform="rotate(105)"/>
    <ellipse cx="0" cy="-12" rx="2.4" ry="7" fill="#c8a052" opacity="0.68" transform="rotate(135)"/>
    <ellipse cx="0" cy="-12" rx="2.4" ry="7" fill="#c8a052" opacity="0.68" transform="rotate(165)"/>
    <ellipse cx="0" cy="-12" rx="2.4" ry="7" fill="#c8a052" opacity="0.68" transform="rotate(195)"/>
    <ellipse cx="0" cy="-12" rx="2.4" ry="7" fill="#c8a052" opacity="0.68" transform="rotate(225)"/>
    <ellipse cx="0" cy="-12" rx="2.4" ry="7" fill="#c8a052" opacity="0.68" transform="rotate(255)"/>
    <ellipse cx="0" cy="-12" rx="2.4" ry="7" fill="#c8a052" opacity="0.68" transform="rotate(285)"/>
    <ellipse cx="0" cy="-12" rx="2.4" ry="7" fill="#c8a052" opacity="0.68" transform="rotate(315)"/>
    <ellipse cx="0" cy="-12" rx="2.4" ry="7" fill="#c8a052" opacity="0.68" transform="rotate(345)"/>

    <!-- Flower center ring -->
    <circle cx="0" cy="0" r="6.5" fill="#c8a052" opacity="0.12"/>
    <circle cx="0" cy="0" r="6.5" stroke="#c8a052" stroke-width="0.8" fill="none" opacity="0.6"/>

    <!-- Stamen -->
    <circle cx="0" cy="0" r="5" fill="#c8a052"/>
    <circle cx="0" cy="0" r="3" fill="#e8c88a"/>
    <circle cx="0" cy="0" r="1.3" fill="#c8a052"/>
  </g>

  <!-- Subtle corner dots on bag -->
  <circle cx="80" cy="112" r="1.6" fill="#c8a052" opacity="0.22"/>
  <circle cx="160" cy="112" r="1.6" fill="#c8a052" opacity="0.22"/>

  <!-- Floating petal accents (4 corners, asymmetric) -->
  <path d="M48,140 C45,134 52,131 54,137 C56,143 51,146 48,140Z"
        fill="#c8a052" fill-opacity="0.14" transform="rotate(-22,51,138)"/>
  <path d="M192,146 C189,140 196,137 198,143 C200,149 195,152 192,146Z"
        fill="#c8a052" fill-opacity="0.11" transform="rotate(18,195,144)"/>
  <path d="M52,172 C49,167 55,164 57,169 C59,174 55,177 52,172Z"
        fill="#c8a052" fill-opacity="0.09" transform="rotate(-38,55,170)"/>
  <path d="M188,168 C191,163 197,165 195,171 C193,177 187,174 188,168Z"
        fill="#c8a052" fill-opacity="0.08" transform="rotate(28,192,170)"/>

  <!-- Small diamond sparkle top-left -->
  <path d="M56,96 L58,91 L60,96 L58,101 Z" fill="#c8a052" opacity="0.18"/>
  <!-- Small diamond sparkle top-right -->
  <path d="M180,86 L182,81 L184,86 L182,91 Z" fill="#c8a052" opacity="0.15"/>

</svg>
