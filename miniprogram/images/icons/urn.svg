<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="#C9A96E" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
  <!-- 底座台阶 -->
  <rect x="2" y="20.5" width="20" height="2.5" rx="0.5"/>
  <!-- 主体 -->
  <rect x="4.5" y="9.5" width="15" height="11"/>
  <!-- 盖沿（略宽于主体，形成边沿） -->
  <rect x="3.5" y="7.5" width="17" height="2"/>
  <!-- 盖面（内收） -->
  <rect x="5.5" y="5.5" width="13" height="2"/>
  <!-- 盖顶（最窄） -->
  <rect x="8.5" y="4" width="7" height="1.5" rx="0.5"/>
  <!-- 一寸照片位置框 -->
  <rect x="9.5" y="11.5" width="5" height="7" rx="0.5" stroke-dasharray="1 0.6"/>
</svg>
