  <!-- right latch: horizontal bar + vertical stem -->
  <line x1="764" y1="140" x2="814" y2="140"/>
  <rect x="777" y="140" width="24" height="46" rx="2"/>

  <!-- control panel window (upper-left of body) -->
  <rect x="50" y="170" width="72" height="50" rx="3"/>

  <!-- ventilation grilles (3 horizontal lines, lower-left) -->
  <line x1="50" y1="320" x2="122" y2="320"/>
  <line x1="50" y1="342" x2="122" y2="342"/>
  <line x1="50" y1="364" x2="122" y2="364"/>

  <!-- left caster wheel -->
